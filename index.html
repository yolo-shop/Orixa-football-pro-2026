<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORIXA PRO 2026 | GLOBAL MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root { --ef-blue: #001f3f; --ef-gold: #ffd700; --ef-pink: #ff0055; --bg: #050a14; --epic: linear-gradient(135deg, #ffd700, #b8860b); --standard: linear-gradient(135deg, #1e40af, #1e293b); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* THE "SLANT" (LANDSCAPE) AUTO-FIX */
        @media screen and (orientation: portrait) {
            #rotate-overlay { display: flex !important; }
        }
        #rotate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: none; align-items: center; justify-content: center; text-align: center; flex-direction: column; }
        
        /* LOADING */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a14; z-index: 20000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--ef-gold); border-radius: 50%; animation: spin 1s linear infinite; }

        /* UI */
        .top-nav { background: var(--ef-blue); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--ef-gold); position: sticky; top: 0; z-index: 1000; }
        .coin-pill { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--ef-gold); color: var(--ef-gold); font-size: 12px; font-weight: bold; }
        .section { display: none; padding: 15px; animation: slide 0.3s; }
        .section.active { display: block; }

        /* CARDS */
        .player-card { width: 120px; border-radius: 12px; padding: 10px; margin: 5px; position: relative; text-align: center; border: 2px solid rgba(255,255,255,0.1); display: inline-block; vertical-align: top; }
        .card-epic { background: var(--epic); color: #000; box-shadow: 0 0 15px var(--ef-gold); }
        .card-standard { background: var(--standard); color: #fff; }
        .p-rating { position: absolute; top: 5px; left: 5px; background: #000; color: #fff; padding: 2px 5px; border-radius: 4px; font-size: 13px; font-weight: 900; }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-tab { color: #555; font-size: 10px; font-weight: bold; background: none; border: none; text-transform: uppercase; }
        .nav-tab.active { color: var(--ef-gold); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slide { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div style="font-size: 50px;">🔄</div>
        <h2>ROTATE TO SLANT</h2>
        <p>Turn your phone sideways to play Orixa Pro</p>
    </div>

    <div id="loading-screen">
        <h2 style="color:var(--ef-gold); font-style:italic;">ORIXA PRO 26</h2>
        <div class="spinner"></div>
        <p id="load-status" style="margin-top:15px; font-size:11px;">CONNECTING TO GLOBAL DATABASE...</p>
    </div>

    <div class="top-nav">
        <div style="font-weight:900; font-style:italic;">ORIXA<span style="color:var(--ef-gold)">PRO 26</span></div>
        <div class="currency-box">
            <div class="coin-pill" style="border-color:#3b82f6; color:#3b82f6;">🔵 <span id="gp">0</span></div>
            <div class="coin-pill">🟡 <span id="coins">0</span></div>
        </div>
    </div>

    <div id="hub" class="section active">
        <div style="background: linear-gradient(90deg, var(--ef-pink), var(--ef-blue)); padding: 20px; border-radius: 15px; margin-bottom: 15px;">
            <div style="font-size:32px; font-weight:900;">DIV <span id="div-num">10</span></div>
            <p style="margin:0; font-size:12px; color:var(--ef-gold);">CLIMB TO DIVISION 1</p>
        </div>
        <button onclick="playMatch()" style="background:var(--ef-pink); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold;">START DIVISION MATCH</button>
        <button onclick="tab('shop')" style="background:#161b26; color:white; border:1px solid var(--ef-gold); padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px;">CONTRACT STARS</button>
    </div>

    <div id="team" class="section">
        <h2 style="color:var(--ef-gold)">MY SQUAD</h2>
        <div id="player-list" style="text-align:center;"></div>
    </div>

    <div id="shop" class="section">
        <h2 style="color:var(--ef-gold)">CONTRACT</h2>
        <button onclick="watchAd()" style="background:var(--ef-blue); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-bottom:15px;">📺 WATCH AD (100 COINS)</button>
        <div style="background:#161b26; padding:15px; border-radius:15px; border:2px solid var(--ef-gold); text-align:center;">
            <p>EPIC: GLOBAL LEGENDS</p>
            <button onclick="sign('epic')" style="background:var(--ef-gold); color:black; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">🟡 100 COINS</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-tab active" onclick="tab('hub', this)">Home</button>
        <button class="nav-tab" onclick="tab('team', this)">Squad</button>
        <button class="nav-tab" onclick="tab('shop', this)">Store</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDp3h13LwtUlD7MiCkMys0EAgX5w2GGupc",
        authDomain: "orixa-football-pro.firebaseapp.com",
        projectId: "orixa-football-pro",
        databaseURL: "https://orixa-football-pro-default-rtdb.firebaseio.com",
        storageBucket: "orixa-football-pro.firebasestorage.app",
        messagingSenderId: "858773652420",
        appId: "1:858773652420:web:efa892ddc9376c264a9a91"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const AD_URL = "https://hillshaveeyes.com/q2b71u4d?key=6716a50682ba951f2884f29df54460f4";

    let userData = { gp: 10000, coins: 0, pts: 0, team: [{n:"L. Messi", r:97, c:"epic", s:"LM"}] };
    let userId = "";

    auth.signInAnonymously().then(() => {
        auth.onAuthStateChanged(user => {
            if (user) {
                userId = user.uid;
                db.ref('users/' + userId).on('value', snap => {
                    if (snap.exists()) userData = snap.val();
                    else db.ref('users/' + userId).set(userData);
                    
                    document.getElementById('loading-screen').style.display = 'none';
                    sync();
                });
            }
        });
    }).catch(e => {
        document.getElementById('load-status').innerText = "ERROR: CHECK FIREBASE RULES";
    });

    function sync() {
        document.getElementById('gp').innerText = userData.gp.toLocaleString();
        document.getElementById('coins').innerText = userData.coins.toLocaleString();
        document.getElementById('div-num').innerText = Math.max(1, 10 - Math.floor(userData.pts / 1000));
        
        const list = document.getElementById('player-list');
        list.innerHTML = '';
        if(userData.team) {
            userData.team.forEach((p, i) => {
                list.innerHTML += `
                    <div class="player-card card-${p.c}">
                        <div class="p-rating">${p.r}</div>
                        <div style="font-size:35px; margin:10px 0;">👤</div>
                        <div style="font-weight:bold; font-size:12px;">${p.n}</div>
                        <button onclick="release(${i})" style="font-size:8px; color:red; background:none; border:none; margin-top:5px;">RELEASE</button>
                    </div>`;
            });
        }
    }

    function tab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    function playMatch() {
        window.open(AD_URL, '_blank');
        userData.pts += 500;
        userData.gp += 2000;
        db.ref('users/' + userId).set(userData);
        alert("Match Won! Data Synced to Cloud.");
    }

    function watchAd() {
        window.open(AD_URL, '_blank');
        setTimeout(() => {
            userData.coins += 100;
            db.ref('users/' + userId).set(userData);
            alert("100 Coins Claimed!");
        }, 10000);
    }

    function sign(type) {
        if(userData.coins < 100) return alert("No Coins!");
        userData.coins -= 100;
        const names = ["E. Haaland", "K. Mbappe", "V. Junior", "Salah"];
        userData.team.push({ n: names[Math.floor(Math.random()*4)], r: 96, c: "epic", s: "★" });
        db.ref('users/' + userId).set(userData);
    }

    function release(i) {
        userData.gp += userData.team[i].r * 100;
        userData.team.splice(i, 1);
        db.ref('users/' + userId).set(userData);
    }
</script>
</body>
</html>
